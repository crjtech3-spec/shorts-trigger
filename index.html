<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<title>Shorts Trigger</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background:#0d1117; color:#e6edf3; padding:20px; max-width:520px; margin:0 auto; }
  h1 { font-size:1.3rem; margin:.2rem 0 1rem; display:flex; align-items:center; gap:.5rem; }
  .logo { width:30px; height:30px; }
  button { width:100%; border:0; border-radius:14px; padding:18px; font-size:1.05rem;
           font-weight:700; color:#fff; margin:8px 0; cursor:pointer; }
  .facts { background:#1f6feb; } .motiv { background:#8957e5; } .both { background:#238636; }
  button:active { filter:brightness(1.15); transform:scale(.99); }
  button:disabled { opacity:.5; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:16px; margin:14px 0; }
  label { font-size:.8rem; color:#8b949e; display:block; margin-bottom:6px; }
  input, select { width:100%; padding:12px; border-radius:10px; border:1px solid #30363d;
          background:#0d1117; color:#e6edf3; font-size:.95rem; }
  .row { display:flex; gap:8px; align-items:center; }
  .small { font-size:.8rem; color:#8b949e; }
  #toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
           background:#238636; color:#fff; padding:12px 18px; border-radius:10px;
           opacity:0; transition:opacity .3s; pointer-events:none; max-width:90%; }
  #toast.err { background:#da3633; } #toast.show { opacity:1; }
  .runs a { color:#58a6ff; text-decoration:none; }
  .run { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #21262d; font-size:.85rem; }
  details summary { cursor:pointer; color:#8b949e; font-size:.85rem; }
</style>
</head>
<body>
  <h1><img class="logo" src="icon-192.png" alt=""> Shorts Trigger</h1>

  <div class="card" style="margin-top:0">
    <label>Facts topic category (manual only — scheduled always auto-rotates)</label>
    <select id="category" onchange="save()">
      <option value="auto">🎲 Auto (rotate all topics)</option>
      <option value="animals">🐾 Animals &amp; species</option>
      <option value="nature">🌿 Nature secrets &amp; phenomena</option>
      <option value="geography">🗺️ Geography &amp; places</option>
      <option value="space">🪐 Space &amp; the cosmos</option>
      <option value="science_mystery">🔭 Science mysteries</option>
      <option value="human_body">🧠 Human body &amp; brain</option>
      <option value="physics">⚛️ Everyday physics &amp; chemistry</option>
      <option value="earth">🌋 Earth, oceans &amp; weather</option>
      <option value="archaeology">🏺 Archaeology puzzles</option>
      <option value="plants">🍄 Plants, fungi &amp; microbes</option>
    </select>
    <label style="margin-top:12px;display:flex;align-items:center;gap:10px;cursor:pointer">
      <input type="checkbox" id="trending" onchange="save()"
             style="width:auto;transform:scale(1.3)">
      <span>🗞️ Latest trending news (reputable sources only)</span>
    </label>
    <p class="small" style="margin:6px 0 0">
      Off = timeless facts. On = recent news from outlets like Nature, NASA, BBC,
      Reuters; still fact-checked, with the source linked in the description.
    </p>
  </div>

  <button class="facts" onclick="trigger('facts')">🔬 New Facts video</button>
  <button class="motiv" onclick="trigger('motivation')">💪 New Motivation video</button>
  <button class="both"  onclick="trigger('both')">⚡ Both channels</button>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong style="font-size:.95rem">Recent runs</strong>
      <button style="width:auto;padding:8px 14px;margin:0;background:#21262d" onclick="loadRuns()">↻</button>
    </div>
    <div id="runs" class="runs"><div class="small">Add your token below, then refresh.</div></div>
  </div>

  <details class="card">
    <summary>⚙️ Settings (GitHub token)</summary>
    <div style="margin-top:12px">
      <label>Fine-grained token (Actions: read & write on the repo)</label>
      <input id="token" type="password" placeholder="github_pat_..." oninput="save()">
      <p class="small" style="margin:10px 0 0">
        Stored only on this device. Repo: <span id="repolbl"></span>
      </p>
      <label style="margin-top:10px">Owner/repo</label>
      <input id="repo" oninput="save()" placeholder="owner/repo">
    </div>
  </details>

  <div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const WF = "shorts.yml", BR = "master";
function save(){ localStorage.token=$("token").value.trim(); localStorage.repo=$("repo").value.trim(); localStorage.category=$("category").value; localStorage.trending=$("trending").checked?"1":""; $("repolbl").textContent=localStorage.repo||"—"; }
function load(){ $("token").value=localStorage.token||""; $("repo").value=localStorage.repo||"crjtech3-spec/shorts-automation"; $("category").value=localStorage.category||"auto"; $("trending").checked=localStorage.trending==="1"; save(); }
function toast(msg, err){ const t=$("toast"); t.textContent=msg; t.className="show"+(err?" err":""); setTimeout(()=>t.className="",3000); }
function hdr(){ return { "Authorization":"Bearer "+localStorage.token, "Accept":"application/vnd.github+json", "X-GitHub-Api-Version":"2022-11-28" }; }

async function trigger(profile){
  if(!localStorage.token){ toast("Add your token in Settings first", true); return; }
  try{
    const category = $("category").value || "auto";
    const mode = $("trending").checked ? "trending" : "evergreen";
    const r = await fetch(`https://api.github.com/repos/${localStorage.repo}/actions/workflows/${WF}/dispatches`,
      { method:"POST", headers:{...hdr(),"Content-Type":"application/json"},
        body: JSON.stringify({ ref:BR, inputs:{ profile, category, mode } }) });
    let note = (profile!=="motivation" && category!=="auto") ? " ("+category+")" : "";
    if(profile!=="motivation" && mode==="trending") note += " 🗞️trending";
    if(r.status===204){ toast("🚀 "+profile+note+" run started!"); setTimeout(loadRuns, 3000); }
    else { toast("Error "+r.status+": "+(await r.text()).slice(0,80), true); }
  }catch(e){ toast("Network error: "+e.message, true); }
}

async function loadRuns(){
  if(!localStorage.token){ return; }
  try{
    const r = await fetch(`https://api.github.com/repos/${localStorage.repo}/actions/workflows/${WF}/runs?per_page=6`, { headers:hdr() });
    const d = await r.json();
    if(!d.workflow_runs){ $("runs").innerHTML='<div class="small">'+(d.message||"No access")+'</div>'; return; }
    $("runs").innerHTML = d.workflow_runs.map(w=>{
      const icon = w.status!=="completed" ? "⏳" : w.conclusion==="success" ? "✅" : "❌";
      const t = new Date(w.created_at).toLocaleString();
      return `<div class="run"><span>${icon} <a href="${w.html_url}" target="_blank">${w.display_title.slice(0,28)}</a></span><span class="small">${t}</span></div>`;
    }).join("") || '<div class="small">No runs yet.</div>';
  }catch(e){ $("runs").innerHTML='<div class="small">'+e.message+'</div>'; }
}

load(); loadRuns();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js"); }
</script>
</body>
</html>
